name: Build & Release Topo Core

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross-Compilation Tools
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (Release)
        working-directory: topo-core
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/topo-core ../topo-core-${{ matrix.arch }}

      - name: Generate Checksum
        run: sha256sum topo-core-${{ matrix.arch }} > topo-core-${{ matrix.arch }}.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: topo-core-${{ matrix.arch }}
          path: |
            topo-core-${{ matrix.arch }}
            topo-core-${{ matrix.arch }}.sha256

  release:
    name: Attach Release Assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Verify Release Notes
        run: test -f "docs/releases/${{ github.ref_name }}.md"

      - name: Attach Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          files: |
            artifacts/topo-core-x86_64/topo-core-x86_64
            artifacts/topo-core-x86_64/topo-core-x86_64.sha256
            artifacts/topo-core-aarch64/topo-core-aarch64
            artifacts/topo-core-aarch64/topo-core-aarch64.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
