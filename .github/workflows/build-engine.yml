name: Build & Release Topo Core

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross-Compilation Tools
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build (Release)
        working-directory: topo-core
        run: |
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }}
          mv target/${{ matrix.target }}/release/topo-core ../topo-core-${{ matrix.arch }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: topo-core-${{ matrix.arch }}
          path: topo-core-${{ matrix.arch }}

  package:
    name: Build Debian/RPM Packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Build Debian and RPM Packages
        run: |
          packaging/build-linux-packages.sh \
            --x86_64-engine artifacts/topo-core-x86_64/topo-core-x86_64 \
            --aarch64-engine artifacts/topo-core-aarch64/topo-core-aarch64 \
            --output-dir dist/packages

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: topo-linux-packages
          path: dist/packages/*

  smoke-ubuntu:
    name: Smoke Test DEB on Ubuntu
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download Package Artifacts
        uses: actions/download-artifact@v4
        with:
          name: topo-linux-packages
          path: dist/packages

      - name: Install and Verify DEB
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          mkdir -p "$HOME/.local/bin"
          rm -f "$HOME/.local/bin/topo"
          sudo env SUDO_USER="$USER" SUDO_UID="$(id -u)" apt install -y ./dist/packages/topo_*_amd64.deb

          /usr/bin/topo --version
          test "$(cat /usr/lib/topo/.topo-install-source)" = "package"

          hash -p "$HOME/.local/bin/topo" topo
          if [ -x "$HOME/.local/bin/topo" ]; then
            grep -F "Managed by topo package compatibility launcher" "$HOME/.local/bin/topo"
          else
            hash -r
          fi
          topo --version

          update_output="$(topo update)"
          printf '%s\n' "$update_output"
          grep -F "Checking for updates" <<<"$update_output"
          ! grep -F "sudo apt upgrade topo" <<<"$update_output"
          ! grep -F "sudo dnf upgrade topo" <<<"$update_output"

          remove_output="$(topo remove)"
          printf '%s\n' "$remove_output"
          grep -F "apt remove -y topo" <<<"$remove_output"
          ! grep -F "dnf remove -y topo" <<<"$remove_output"
          ! dpkg-query -W topo

  smoke-fedora:
    name: Smoke Test RPM on Fedora
    needs: package
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - name: Download Package Artifacts
        uses: actions/download-artifact@v4
        with:
          name: topo-linux-packages
          path: dist/packages

      - name: Install and Verify RPM
        shell: bash
        run: |
          set -euo pipefail
          dnf install -y ./dist/packages/topo-*-1.x86_64.rpm

          topo --version
          test "$(cat /usr/lib/topo/.topo-install-source)" = "package"

          update_output="$(topo update)"
          printf '%s\n' "$update_output"
          grep -F "Checking for updates" <<<"$update_output"
          ! grep -F "sudo apt upgrade topo" <<<"$update_output"
          ! grep -F "sudo dnf upgrade topo" <<<"$update_output"

          remove_output="$(topo remove)"
          printf '%s\n' "$remove_output"
          grep -F "dnf remove -y topo" <<<"$remove_output"
          ! grep -F "apt remove -y topo" <<<"$remove_output"
          ! rpm -q topo

  release:
    name: Attach Release Assets
    needs: [package, smoke-ubuntu, smoke-fedora]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 Core Artifact
        uses: actions/download-artifact@v4
        with:
          name: topo-core-x86_64
          path: artifacts/topo-core-x86_64

      - name: Download aarch64 Core Artifact
        uses: actions/download-artifact@v4
        with:
          name: topo-core-aarch64
          path: artifacts/topo-core-aarch64

      - name: Download Package Artifacts
        uses: actions/download-artifact@v4
        with:
          name: topo-linux-packages
          path: dist/packages

      - name: Verify Release Notes
        run: test -f "docs/releases/${{ github.ref_name }}.md"

      - name: Import GPG Release Key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_PRIVATE_KEY}" ]; then
            echo "::error::GPG_PRIVATE_KEY secret is required to sign release assets."
            exit 1
          fi
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Stage Release Assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets
          cp artifacts/topo-core-x86_64/topo-core-x86_64 release-assets/
          cp artifacts/topo-core-aarch64/topo-core-aarch64 release-assets/
          cp dist/packages/*.deb release-assets/
          cp dist/packages/*.rpm release-assets/

      - name: Generate Release Checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          rm -f SHA256SUMS
          sha256sum \
            topo-core-x86_64 \
            topo-core-aarch64 \
            *.deb \
            *.rpm \
            > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Sign Checksum Manifest
        shell: bash
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_PASSPHRASE}" ]; then
            echo "::error::GPG_PASSPHRASE secret is required to sign release assets."
            exit 1
          fi
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${GPG_PASSPHRASE}" \
            --armor --detach-sign release-assets/SHA256SUMS

      - name: Attach Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          files: |
            release-assets/topo-core-x86_64
            release-assets/topo-core-aarch64
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/SHA256SUMS
            release-assets/SHA256SUMS.asc
            assets/topo-release-public.asc
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc.') || contains(github.ref_name, '-beta.') || contains(github.ref_name, '-alpha.') }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
